<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <!-- Top bar: editor access icon button -->
    <div class="topbar">
      <button id="editor-btn" class="icon-btn" type="button" title="Editor access" aria-label="Editor access">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22" aria-hidden="true">
          <circle cx="7.5" cy="15.5" r="5.5" />
          <path d="m21 2-9.6 9.6" />
          <path d="m15.5 7.5 3 3L22 7l-3-3" />
        </svg>
      </button>
    </div>

    <!-- Header -->
    <header class="header">
      <span class="header-title">UI Organized</span>
      <span class="header-title">Progress Board</span>
    </header>

    <!-- Add new progress entry (shown only when signed in) -->
    <section class="add-card" id="add-card" hidden>
      <h2 class="add-card-title">Add Progress</h2>
      <form id="entry-form" class="entry-form">
        <label class="field">
          <span class="field-label">Week</span>
          <input type="text" id="week" name="week" placeholder="e.g. Week 1" required />
        </label>

        <div class="field">
          <span class="field-label">Description</span>
          <div class="rte">
            <div class="rte-toolbar" role="toolbar" aria-label="Text formatting">
              <button type="button" class="rte-btn" data-cmd="bold" title="Bold (Ctrl+B)" aria-label="Bold"><b>B</b></button>
              <button type="button" class="rte-btn" data-cmd="italic" title="Italic (Ctrl+I)" aria-label="Italic"><i>I</i></button>
              <button type="button" class="rte-btn" data-cmd="underline" title="Underline (Ctrl+U)" aria-label="Underline"><u>U</u></button>
              <span class="rte-sep" aria-hidden="true"></span>
              <button type="button" class="rte-btn" data-cmd="formatBlock" data-value="h3" title="Heading" aria-label="Heading">H</button>
              <button type="button" class="rte-btn" data-cmd="insertUnorderedList" title="Bulleted list" aria-label="Bulleted list">&bull;&nbsp;List</button>
              <button type="button" class="rte-btn" data-cmd="insertOrderedList" title="Numbered list" aria-label="Numbered list">1.&nbsp;List</button>
              <span class="rte-sep" aria-hidden="true"></span>
              <button type="button" class="rte-btn" data-cmd="createLink" title="Add link" aria-label="Add link">🔗</button>
              <button type="button" class="rte-btn" data-cmd="removeFormat" title="Clear formatting" aria-label="Clear formatting">✕</button>
            </div>
            <div id="description" class="rte-editor" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="Description of this week's progress"></div>
          </div>
        </div>

        <label class="field">
          <span class="field-label">Files (images &amp; PDFs)</span>
          <input type="file" id="files" name="files" accept="image/*,application/pdf" multiple />
        </label>

        <button type="submit" class="btn-primary" id="submit-btn">Publish Entry</button>
      </form>
    </section>

    <!-- Progress entries render here (visible to everyone) -->
    <section id="entries" class="entries"></section>
  </main>

  <!-- Editor access modal -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" type="button" aria-label="Close">&times;</button>

      <!-- Signed-out view: enter token -->
      <div id="modal-signin">
        <h2 class="add-card-title" id="modal-title">Editor Access</h2>
        <p class="hint">
          Paste a GitHub personal access token with
          <strong>Contents: Read &amp; write</strong> on this repo. It's stored
          only in this browser and never committed. Viewers don't need one.
        </p>
        <input type="password" id="token" placeholder="github_pat_..." autocomplete="off" />
        <p class="error" id="token-error" hidden></p>
        <button class="btn-primary" id="save-token" type="button">Verify &amp; Save</button>
      </div>

      <!-- Signed-in view -->
      <div id="modal-signedin" hidden>
        <h2 class="add-card-title">Editor Access</h2>
        <p class="hint">You're signed in as an editor on this device.</p>
        <button class="btn-delete" id="clear-token" type="button">Sign out</button>
      </div>
    </div>
  </div>

  <!-- Photo gallery lightbox -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
    <button class="lb-close" id="lb-close" type="button" aria-label="Close">&times;</button>
    <button class="lb-nav lb-prev" id="lb-prev" type="button" aria-label="Previous photo">&#8249;</button>
    <figure class="lb-figure">
      <img id="lb-img" class="lb-img" alt="" />
      <figcaption id="lb-caption" class="lb-caption"></figcaption>
    </figure>
    <button class="lb-nav lb-next" id="lb-next" type="button" aria-label="Next photo">&#8250;</button>
    <div id="lb-counter" class="lb-counter" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
